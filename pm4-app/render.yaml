services:
  # ── Servicio principal Node.js ────────────────────────────────────────────
  - type: web
    name: pm4-app
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PM4_BASE_URL
        sync: false
      - key: PM4_TOKEN
        sync: false
      - key: IFRAME_ENCRYPTION_KEY
        sync: false
      - key: COTIZADOR_API_URL
        sync: false   # ← poner la URL del servicio cotizador de Render

  # ── Micro-servicio cotizador Python ──────────────────────────────────────
  - type: web
    name: cotizador-api
    runtime: python
    rootDir: cotizador-service
    buildCommand: pip install -r requirements.txt && pip install openpyxl && python export_tables.py
    startCommand: gunicorn --workers=1 --timeout=60 --bind=0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
