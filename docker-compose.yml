version: '3.8'

services:
  pm4-app:
    build:
      context: ./pm4-app
      dockerfile: Dockerfile
    container_name: pm4-app-container
    ports:
      - "5173:5173"
      - "3001:3001"
    volumes:
      - ./pm4-app:/app
      - /app/node_modules
      - /app/frontend/node_modules
      - /app/backend/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
    depends_on:
      - cotizador-service

  cotizador-service:
    build:
      context: ./pm4-app/cotizador-service
      dockerfile: Dockerfile
    container_name: cotizador-service-container
    ports:
      - "5001:5001"
    volumes:
      - ./pm4-app/cotizador-service:/app
    environment:
      - PORT=5001
